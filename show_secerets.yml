---

- name: show_secrets
  hosts: servers
  become: yes

  vars_files:
    - secrets.yml

  tasks:
    - name: show password
      debug:
        msg: "my password is {{ password }}"
      no_log: true # logs will not show after execute
    
    - name: show api keys
      debug:
        msg: "my api key is {{ api_key }}"
      no_log: true #Logs will not show after execute 